<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Harshita 🎂</title>  
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ffc0cb, #ffe4ec);
      overflow: hidden;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 25px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.2);
      text-align: center;
      max-width: 350px;
      animation: fadeIn 1.5s ease;
      position: relative;
      z-index: 2;
    }

    h1 {
      color: #ff4d88;
      margin-bottom: 10px;
    }

    p {
      color: #555;
    }

    button {
      margin-top: 20px;
      padding: 12px 25px;
      border: none;
      background: #ff4d88;
      color: white;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #e63e73;
      transform: scale(1.05);
    }

    .message {
      margin-top: 20px;
      font-size: 18px;
      display: none;
      line-height: 1.6;
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .heart {
      position: absolute;
      color: #ff4d88;
      animation: float 6s linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(100vh); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(-10vh); opacity: 0; }
    }

    .typing {
      border-right: 2px solid #ff4d88;
      white-space: nowrap;
      overflow: hidden;
      display: inline-block;
      animation: typing 3s steps(30, end), blink 0.7s infinite;
    }

    @keyframes typing {
      from { width: 0 }
      to { width: 100% }
    }

    @keyframes blink {
      50% { border-color: transparent }
    }
  </style>
</head>
<body><div class="card">
  <h1>Hey Harshita 🎉</h1>
  <p>I didn’t want to wish you in a boring way...</p><button onclick="showMessage()">Tap here 👀</button>

  <div class="message" id="msg">
    <p class="typing">Happy Birthday 🎂</p>
    <p>You have this really cute energy that just makes everything feel lighter 😊</p>
    <p>Stay the same… it suits you ✨</p>
  </div>
</div><script>
  function showMessage() {
    document.getElementById("msg").style.display = "block";
  }

  // floating hearts
  setInterval(() => {
    const heart = document.createElement('div');
    heart.className = 'heart';
    heart.innerHTML = '❤';
    heart.style.left = Math.random() * 100 + 'vw';
    heart.style.fontSize = (Math.random() * 10 + 15) + 'px';
    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 6000);
  }, 400);
</script></body>
</html>
